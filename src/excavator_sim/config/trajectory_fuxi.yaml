# "伏羲" 轨迹配置
# 坐标系：以挖掘机底盘中心为原点，X向前，Y向左，Z向上

trajectory:
  # 书写平面参数
  writing_plane:
    z_height: 0.5  # 书写高度
    x_offset: 3.5  # 书写区域X偏移
    y_offset: 0.0  # 书写区域Y偏移
    scale: 0.8     # 字体缩放

  # 笔画间隔
  stroke_gap:
    lift_height: 0.3  # 提笔高度
    move_speed: 0.5   # 移动速度

  # "伏" 字轨迹点 (相对坐标)
  fu_character:
    strokes:
      # 撇
      - name: "pie"
        points:
          - [0.0, 0.8, 0.0]
          - [-0.3, 0.4, 0.0]
          - [-0.5, 0.0, 0.0]
      # 横
      - name: "heng"
        points:
          - [-0.2, 0.6, 0.0]
          - [0.4, 0.6, 0.0]
      # 撇
      - name: "pie2"
        points:
          - [0.1, 0.6, 0.0]
          - [-0.1, 0.3, 0.0]
          - [-0.3, 0.0, 0.0]
      # 捺
      - name: "na"
        points:
          - [0.1, 0.5, 0.0]
          - [0.3, 0.3, 0.0]
          - [0.5, 0.0, 0.0]
      # 点
      - name: "dian"
        points:
          - [0.3, 0.7, 0.0]
          - [0.35, 0.65, 0.0]

  # "羲" 字轨迹点 (相对坐标，X偏移1.2)
  xi_character:
    x_offset: 1.2
    strokes:
      # 上部横
      - name: "heng1"
        points:
          - [-0.3, 0.9, 0.0]
          - [0.3, 0.9, 0.0]
      # 左撇
      - name: "pie1"
        points:
          - [-0.1, 0.9, 0.0]
          - [-0.3, 0.6, 0.0]
      # 右点
      - name: "dian1"
        points:
          - [0.1, 0.85, 0.0]
          - [0.2, 0.7, 0.0]
      # 中横
      - name: "heng2"
        points:
          - [-0.25, 0.6, 0.0]
          - [0.25, 0.6, 0.0]
      # 竖
      - name: "shu"
        points:
          - [0.0, 0.6, 0.0]
          - [0.0, 0.3, 0.0]
      # 下部复杂笔画（简化）
      - name: "bottom_left"
        points:
          - [-0.3, 0.3, 0.0]
          - [-0.4, 0.0, 0.0]
      - name: "bottom_mid"
        points:
          - [-0.1, 0.3, 0.0]
          - [0.0, 0.0, 0.0]
      - name: "bottom_right"
        points:
          - [0.2, 0.3, 0.0]
          - [0.4, 0.0, 0.0]