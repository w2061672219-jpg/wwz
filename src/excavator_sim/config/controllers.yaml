excavator:
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50

  swing_position_controller:
    type: effort_controllers/JointPositionController
    joint: swing_joint
    pid: {p: 5000.0, i: 100.0, d: 500.0}

  boom_position_controller:
    type: effort_controllers/JointPositionController
    joint: boom_joint
    pid: {p: 20000.0, i: 500.0, d: 2000.0}

  arm_position_controller:
    type: effort_controllers/JointPositionController
    joint: arm_joint
    pid: {p: 15000.0, i: 300.0, d: 1500.0}

  bucket_position_controller:
    type: effort_controllers/JointPositionController
    joint: bucket_joint
    pid: {p: 8000.0, i: 200.0, d: 800.0}

# 关节组控制器（用于轨迹执行）
  excavator_arm_controller:
    type: effort_controllers/JointTrajectoryController
    joints:
      - swing_joint
      - boom_joint
      - arm_joint
      - bucket_joint
    gains:
      swing_joint: {p: 5000.0, i: 100.0, d: 500.0}
      boom_joint: {p: 20000.0, i: 500.0, d: 2000.0}
      arm_joint: {p: 15000.0, i: 300.0, d: 1500.0}
      bucket_joint: {p: 8000.0, i: 200.0, d: 800.0}
    constraints:
      goal_time: 5.0
      swing_joint: {goal: 0.1}
      boom_joint: {goal: 0.1}
      arm_joint: {goal: 0.1}
      bucket_joint: {goal: 0.1}