excavator:
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50

  boom_position_controller:
    type: effort_controllers/JointPositionController
    joint: boom_joint
    pid: {p: 50000.0, i: 20.0, d: 2000.0, i_clamp: 10000.0}

  arm_position_controller:
    type: effort_controllers/JointPositionController
    joint: arm_joint
    pid: {p: 35000.0, i: 20.0, d: 1000.0, i_clamp: 10000.0}

  bucket_position_controller:
    type: effort_controllers/JointPositionController
    joint: bucket_joint
    pid: {p: 20000.0, i: 50.0, d: 50.0, i_clamp: 5000.0}

  swing_position_controller:
    type: effort_controllers/JointPositionController
    joint: swing_joint
    pid: {p: 40000.0, i: 5.0, d: 2000.0, i_clamp: 5000.0}
